    // ==================== IndexedDB 資料儲存核心引擎 ====================
    const DB_NAME = 'iida_logger_db_v5';
    const DB_VERSION = 1;
    const STORES = ['tile_layout', 'events', 'todos', 'diaries', 'expenses', 'sync_settings'];

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          STORES.forEach(store => {
            if (!db.objectStoreNames.contains(store)) {
              db.createObjectStore(store);
            }
          });
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function getDBData(storeName, key) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      } catch (err) {
        console.error('IndexedDB 讀取失敗:', err);
        return null;
      }
    }

    async function setDBData(storeName, key, val) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.put(val, key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      } catch (err) {
        console.error('IndexedDB 寫入失敗:', err);
      }
    }

    function App() {

      const colorPresets = {
        vermilion: { bg: 'bg-[#cf2b1f]', text: 'text-white', border: 'border-red-900/30', badge: 'bg-red-950/20 text-red-100', dot: '#cf2b1f' },
        charcoal: { bg: 'bg-[#1a1c20]', text: 'text-white', border: 'border-zinc-800', badge: 'bg-zinc-800 text-zinc-300', dot: '#4b5563' },
        beige: { bg: 'bg-[#f5f2eb]', text: 'text-neutral-900', border: 'border-[#e4dfd5]', badge: 'bg-neutral-900/10 text-neutral-800', dot: '#d4ceb8' },
        slate: { bg: 'bg-[#2e3a47]', text: 'text-white', border: 'border-slate-700/40', badge: 'bg-white/10 text-slate-100', dot: '#2e3a47' },
        mustard: { bg: 'bg-[#dca134]', text: 'text-neutral-950', border: 'border-amber-700/30', badge: 'bg-neutral-950/10 text-neutral-900', dot: '#dca134' },
        matcha: { bg: 'bg-[#4a5d4e]', text: 'text-white', border: 'border-emerald-900/20', badge: 'bg-emerald-950/20 text-emerald-100', dot: '#4a5d4e' },
        sky: { bg: 'bg-[#4b84a1]', text: 'text-white', border: 'border-sky-900/20', badge: 'bg-sky-950/20 text-sky-100', dot: '#4b84a1' }
      };

      const [tiles, setTiles] = useState([]);
      const [events, setEvents] = useState([]);
      const [todos, setTodos] = useState([]);
      const [diaries, setDiaries] = useState([]);
      const [expenses, setExpenses] = useState([]);

      // 🍏 異步從 IndexedDB 載入，並處理無痛 LocalStorage 遷移
      useEffect(() => {
        async function loadAndMigrate() {
          const migrateOrLoad = async (storeName, lsKey, defaultValue) => {
            let val = await getDBData(storeName, 'data');
            if (val === undefined || val === null) {
              const lsVal = localStorage.getItem(lsKey);
              if (lsVal) {
                try {
                  val = JSON.parse(lsVal);
                  await setDBData(storeName, 'data', val);
                } catch (e) {
                  val = defaultValue;
                }
              } else {
                val = defaultValue;
                await setDBData(storeName, 'data', val);
              }
            }
            return val;
          };

          const loadedTiles = await migrateOrLoad('tile_layout', 'infobar_tile_layout_v5', [
            { id: 'clock', type: 'clock', size: 2, color: 'charcoal' },
            { id: 'weather', type: 'weather', size: 1, color: 'beige' },
            { id: 'calendar', type: 'calendar', size: 3, color: 'charcoal' },
            { id: 'diary', type: 'diary', size: 1, color: 'vermilion' },
            { id: 'expense', type: 'expense', size: 1, color: 'slate' },
            { id: 'todo', type: 'todo', size: 1, color: 'beige' },
            { id: 'settings', type: 'settings', size: 1, color: 'slate' }
          ]);
          setTiles(loadedTiles);

          const loadedEvents = await migrateOrLoad('events', 'infobar_events_v5', [
            { id: 'ev1', date: getFormattedDateStr(new Date()), title: '深澤直人設計講座 🎨', time: '14:00', color: 'bg-red-500', desc: '線上研討會 / NISHIKIGOI 美學探討' },
            { id: 'ev2', date: getFormattedDateStr(new Date()), title: '每日放鬆冥想 🧘‍♀️', time: '19:30', color: 'bg-blue-500', desc: '釋放日常工作壓力' }
          ]);
          setEvents(loadedEvents);

          const loadedTodos = await migrateOrLoad('todos', 'infobar_todos_v5', [
            { id: 't1', date: getFormattedDateStr(new Date()), text: '設計極簡 iOS PWA 佈局 💻', completed: false },

          ]);
          setTodos(loadedTodos);

          const loadedDiaries = await migrateOrLoad('diaries', 'infobar_diaries_v5', [
            { id: 'd1', date: getFormattedDateStr(new Date()), text: '今天我將版面優化為真正 100% 滿版適配 iPhone 屏幕，沉浸感十足，完全無邊框！而且終於實裝了真正的雲端同步機制！', category: 'diary', mood: '😊', weather: '☀️' }
          ]);
          setDiaries(loadedDiaries);

          const loadedExpenses = await migrateOrLoad('expenses', 'infobar_expenses_v5', [
            { id: 'e1', date: getFormattedDateStr(new Date()), amount: 150, category: '餐飲', description: '午餐外帶極簡日式弁當' },
            { id: 'e2', date: getFormattedDateStr(new Date()), amount: 65, category: '交通', description: '乘地鐵通勤' }
          ]);
          setExpenses(loadedExpenses);

          const loadedSyncSettings = await migrateOrLoad('sync_settings', 'iida_sync_settings_v5', {
            username: '深澤直人',
            language: 'zh-TW',
            soundEffects: true,
            googleClientId: '',
            googleApiKey: '',
            googleStatus: 'disconnected',
            googleLastSync: '從未同步',
            icloudWebcalUrl: '',
            icloudStatus: 'disconnected',
            icloudLastSync: '從未同步'
          });
          setSyncSettings(loadedSyncSettings);

          setIsLoaded(true);
        }
        loadAndMigrate();
      }, []);

      // 監聽 React 狀態變更並自動同步至 IndexedDB (僅在載入完成後觸發)
      useEffect(() => { if (isLoaded) setDBData('tile_layout', 'data', tiles); }, [tiles, isLoaded]);
      useEffect(() => { if (isLoaded) setDBData('events', 'data', events); }, [events, isLoaded]);
      useEffect(() => { if (isLoaded) setDBData('todos', 'data', todos); }, [todos, isLoaded]);
      useEffect(() => { if (isLoaded) setDBData('diaries', 'data', diaries); }, [diaries, isLoaded]);
      useEffect(() => { if (isLoaded) setDBData('expenses', 'data', expenses); }, [expenses, isLoaded]);
      useEffect(() => { if (isLoaded) setDBData('sync_settings', 'data', syncSettings); }, [syncSettings, isLoaded]);

      const playClickSound = () => {
        if (!syncSettings.soundEffects) return;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(1200, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.03);
          gain.gain.setValueAtTime(0.02, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
          osc.start();
          osc.stop(ctx.currentTime + 0.04);
        } catch (e) {
          console.log("音效受限播放。");
        }
      };

      useEffect(() => {
        const timer = setInterval(() => { setSystemTime(new Date()); }, 1000);
        return () => clearInterval(timer);
      }, []);

      function getFormattedDateStr(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }

      function getDaySummary(dateStr) {
        const dayEvents = events.filter(ev => ev.date === dateStr);
        const dayTodos = todos.filter(t => t.date === dateStr);
        const dayDiaries = diaries.filter(d => d.date === dateStr);
        const dayExpenses = expenses.filter(e => e.date === dateStr);
        const totalExpense = dayExpenses.reduce((sum, curr) => sum + curr.amount, 0);

        return {
          hasEvents: dayEvents.length > 0,
          events: dayEvents,
          hasTodos: dayTodos.length > 0,
          todoDoneCount: dayTodos.filter(t => t.completed).length,
          todoTotalCount: dayTodos.length,
          hasDiaries: dayDiaries.length > 0,
          diaries: dayDiaries,
          totalExpense: totalExpense
        };
      }

      const weekDaysZH = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];

      const handleGoogleSync = () => {
        playClickSound();
        if (!syncSettings.googleClientId || !syncSettings.googleApiKey) {
          showToast("⚠️ 請先在設定中輸入正確的 Client ID 與 API Key！", "error");
          return;
        }

        setSyncSettings(prev => ({ ...prev, googleStatus: 'syncing' }));

        try {
          const client = google.accounts.oauth2.initTokenClient({
            client_id: syncSettings.googleClientId,
            scope: 'https://www.googleapis.com/auth/calendar.events.readonly',
            callback: async (tokenResponse) => {
              if (tokenResponse.error !== undefined) {
                setSyncSettings(prev => ({ ...prev, googleStatus: 'disconnected' }));
                showToast("❌ Google 授權失敗", "error");
                return;
              }

              try {
                const response = await fetch(
                  `https://www.googleapis.com/calendar/v3/calendars/primary/events?key=${syncSettings.googleApiKey}`,
                  {
                    headers: { 'Authorization': `Bearer ${tokenResponse.access_token}` }
                  }
                );
                const data = await response.json();
                
                if (data.items) {
                  const googleEvents = data.items.map(item => {
                    const startDateTime = item.start.dateTime || item.start.date;
                    const datePart = startDateTime.slice(0, 10);
                    const timePart = startDateTime.length > 10 ? startDateTime.slice(11, 16) : '00:00';
                    
                    return {
                      id: `gcal-${item.id}`,
                      date: datePart,
                      title: `☁️ ${item.summary || '無標題'}`,
                      time: timePart,
                      color: 'bg-emerald-500',
                      desc: item.description || '來自 Google 日曆同步'
                    };
                  });

                  const filteredLocal = events.filter(ev => !ev.id.startsWith('gcal-'));
                  setEvents([...filteredLocal, ...googleEvents]);

                  const nowStr = new Date().toLocaleString('zh-HK', { hour12: false });
                  setSyncSettings(prev => ({
                    ...prev,
                    googleStatus: 'connected',
                    googleLastSync: nowStr
                  }));
                  showToast("🎉 Google Calendar 行程同步成功！");
                } else {
                  throw new Error("無效的行程資料");
                }
              } catch (fetchErr) {
                setSyncSettings(prev => ({ ...prev, googleStatus: 'disconnected' }));
                showToast("❌ 無法拉取 Google Calendar 數據", "error");
              }
            },
          });
          client.requestAccessToken();
        } catch (err) {
          setSyncSettings(prev => ({ ...prev, googleStatus: 'disconnected' }));
          showToast("❌ GIS 初始化失敗，請檢查 Client ID", "error");
        }

      const handleICloudSync = async () => {
        playClickSound();
        if (!syncSettings.icloudWebcalUrl) {
          showToast("⚠️ 請先在設定中輸入 iCloud 公開 WebCal 訂閱網址！", "error");
          return;
        }

        setSyncSettings(prev => ({ ...prev, icloudStatus: 'syncing' }));

        let fetchUrl = syncSettings.icloudWebcalUrl.replace('webcal://', 'https://');
        const corsProxyUrl = `https://corsproxy.io/?${encodeURIComponent(fetchUrl)}`;

        try {
          const response = await fetch(corsProxyUrl);
          const icsText = await response.text();

          const parsedEvents = [];
          const lines = icsText.split(/\r?\n/);
          let currentEv = null;

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.startsWith('BEGIN:VEVENT')) {
              currentEv = {};
            } else if (line.startsWith('END:VEVENT')) {
              if (currentEv && currentEv.dtstart && currentEv.summary) {
                const dt = currentEv.dtstart;
                const year = dt.slice(0, 4);
                const month = dt.slice(4, 6);
                const day = dt.slice(6, 8);
                const dateStr = `${year}-${month}-${day}`;
                const timeStr = dt.includes('T') ? `${dt.slice(9, 11)}:${dt.slice(11, 13)}` : '00:00';

                parsedEvents.push({
                  id: `icloud-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`,
                  date: dateStr,
                  title: `🍏 ${currentEv.summary}`,
                  time: timeStr,
                  color: 'bg-sky-500',
                  desc: currentEv.description || '來自 iCloud 行事曆同步'
                });
              }
              currentEv = null;
            } else if (currentEv) {
              const colonIndex = line.indexOf(':');
              if (colonIndex !== -1) {
                const key = line.slice(0, colonIndex);
                const val = line.slice(colonIndex + 1);
                if (key.startsWith('SUMMARY')) currentEv.summary = val;
                if (key.startsWith('DTSTART')) currentEv.dtstart = val;
                if (key.startsWith('DESCRIPTION')) currentEv.description = val;
              }
            }
          }

          if (parsedEvents.length > 0) {
            const filteredLocal = events.filter(ev => !ev.id.startsWith('icloud-'));
            setEvents([...filteredLocal, ...parsedEvents]);

            const nowStr = new Date().toLocaleString('zh-HK', { hour12: false });
            setSyncSettings(prev => ({
              ...prev,
              icloudStatus: 'connected',
              icloudLastSync: nowStr
            }));
            showToast(`🍏 成功同步 ${parsedEvents.length} 個 iCloud 行程！`);
          } else {
            throw new Error("未能解析出任何行程");
          }
        } catch (err) {
          setSyncSettings(prev => ({ ...prev, icloudStatus: 'disconnected' }));
          showToast("❌ iCloud 同步失敗，請檢查網址與網路連接", "error");
        }

        const startPadding = firstDay.getDay();
        for (let i = startPadding - 1; i >= 0; i--) {
          days.push({ date: new Date(year, month, -i), isCurrentMonth: false });
        }
        for (let i = 1; i <= lastDay.getDate(); i++) {
          days.push({ date: new Date(year, month, i), isCurrentMonth: true });
        }
        return days;

                            </button>

                            {activeSettingSection === 'sound' && (
                              <div className="p-4 border-t border-neutral-800 bg-[#16171b] space-y-3 animate-fadeIn">
                                <div className="flex justify-between items-center">
                                  <div>
                                    <h4 className="text-xs font-bold text-zinc-100">擬真按鍵音效</h4>
                                    <p className="text-[10px] text-zinc-500 font-medium">點擊按鈕與瓷磚時會發出輕柔的 Click 聲</p>
                                  </div>
                                  <button
                                    onClick={() => {
                                      const nextVal = !syncSettings.soundEffects;
                                      setSyncSettings(prev => ({ ...prev, soundEffects: nextVal }));
                                      if (nextVal) setTimeout(() => { playClickSound(); }, 50);
                                    }}
                                    className={`w-12 h-6 rounded-full p-1 transition-colors flex items-center ${syncSettings.soundEffects ? 'bg-[#cf2b1f] justify-end' : 'bg-neutral-800 justify-start'}`}
                                  >
                                    <div className="w-4 h-4 rounded-full bg-white shadow-md" />
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>

                          {/* ☁️ 雲端行事曆真實同步 (Google OAuth & iCloud ICS) */}
                          <div className="bg-[#1a1c20] rounded-[24px] border border-neutral-800 overflow-hidden">
                            <button
                              onClick={() => { playClickSound(); setActiveSettingSection(activeSettingSection === 'sync' ? null : 'sync'); }}
                              className="w-full flex justify-between items-center p-4 text-left font-black text-xs text-zinc-200 hover:bg-neutral-900"
                            >
                              <span className="flex items-center gap-2 uppercase tracking-wider">☁️ 雲端行事曆真實同步</span>
                              <Icons.ChevronDown className={`transform transition-transform ${activeSettingSection === 'sync' ? 'rotate-180 text-sky-400' : ''}`} />
                            </button>

                            {activeSettingSection === 'sync' && (
                              <div className="p-4 border-t border-neutral-800 bg-[#16171b] space-y-4 animate-fadeIn text-xs">
                                
                                {/* Google 欄位 */}
                                <div className="space-y-2 pb-3 border-b border-neutral-800">
                                  <div className="flex justify-between items-center">
                                    <span className="font-bold text-emerald-400">Google OAuth 真實同步</span>
                                    <span className="text-[9px] bg-neutral-900 px-2 py-0.5 rounded text-zinc-400">
                                      {syncSettings.googleStatus === 'connected' ? '已連線' : syncSettings.googleStatus === 'syncing' ? '同步中' : '未連線'}
                                    </span>
                                  </div>
                                  <input
                                    type="text"
                                    placeholder="Google Cloud Console Client ID"
                                    value={syncSettings.googleClientId}
                                    onChange={(e) => setSyncSettings(prev => ({ ...prev, googleClientId: e.target.value }))}
                                    className="w-full bg-neutral-950 border border-neutral-800 rounded-xl p-2 text-xs text-zinc-200 font-mono focus:outline-none"
                                  />
                                  <input
                                    type="password"
                                    placeholder="Google API 金鑰 (API Key)"
                                    value={syncSettings.googleApiKey}
                                    onChange={(e) => setSyncSettings(prev => ({ ...prev, googleApiKey: e.target.value }))}
                                    className="w-full bg-neutral-950 border border-neutral-800 rounded-xl p-2 text-xs text-zinc-200 font-mono focus:outline-none"
                                  />
                                  <div className="flex gap-2">
                                    {syncSettings.googleStatus !== 'connected' ? (
                                      <button onClick={handleGoogleSync} className="flex-1 py-1.5 bg-emerald-700 text-white text-xs font-bold rounded-lg">
                                        進行授權登入
                                      </button>
                                    ) : (
                                      <>
                                        <button onClick={handleGoogleSync} className="flex-1 py-1.5 bg-neutral-800 text-zinc-300 text-xs font-bold rounded-lg">
                                          重新拉取行程
                                        </button>
                                        <button onClick={handleGoogleDisconnect} className="px-2.5 py-1.5 bg-red-950/40 text-red-400 text-xs font-bold rounded-lg">
                                          中斷
                                        </button>
                                      </>
                                    )}
                                  </div>
                                  <p className="text-[9px] text-zinc-500 font-mono text-right">上次連動: {syncSettings.googleLastSync}</p>
                                </div>

                                {/* iCloud WebCal 欄位 */}
                                <div className="space-y-2">
                                  <div className="flex justify-between items-center">
                                    <span className="font-bold text-sky-400">iCloud 行事曆 (WebCal 訂閱)</span>
                                    <span className="text-[9px] bg-neutral-900 px-2 py-0.5 rounded text-zinc-400">
                                      {syncSettings.icloudStatus === 'connected' ? '已訂閱' : syncSettings.icloudStatus === 'syncing' ? '同步中' : '未訂閱'}
                                    </span>
                                  </div>
                                  <input
                                    type="text"
                                    placeholder="webcal://pXX-caldav.icloud.com/..."
                                    value={syncSettings.icloudWebcalUrl}
                                    onChange={(e) => setSyncSettings(prev => ({ ...prev, icloudWebcalUrl: e.target.value }))}
                                    className="w-full bg-neutral-950 border border-neutral-800 rounded-xl p-2 text-xs text-zinc-200 font-mono focus:outline-none"
                                  />
                                  <div className="flex gap-2">
                                    {syncSettings.icloudStatus !== 'connected' ? (
                                      <button onClick={handleICloudSync} className="flex-1 py-1.5 bg-sky-700 text-white text-xs font-bold rounded-lg">
                                        開始解析並訂閱
                                      </button>
                                    ) : (
                                      <>
                                        <button onClick={handleICloudSync} className="flex-1 py-1.5 bg-neutral-800 text-zinc-300 text-xs font-bold rounded-lg">
                                          重新拉取 iCloud
                                        </button>
                                        <button onClick={handleICloudDisconnect} className="px-2.5 py-1.5 bg-red-950/40 text-red-400 text-xs font-bold rounded-lg">
                                          取消訂閱
                                        </button>
                                      </>
                                    )}
                                  </div>
                                  <p className="text-[9px] text-zinc-500 font-mono text-right">上次連動: {syncSettings.icloudLastSync}</p>
                                </div>

                              </div>
                            )}
                          </div>

                          {/* 一般設定 */}
                          <div className="bg-[#1a1c20] rounded-[24px] border border-neutral-800 overflow-hidden">
                            <button
                              onClick={() => { playClickSound(); setActiveSettingSection(activeSettingSection === 'general' ? null : 'general'); }}
                              className="w-full flex justify-between items-center p-4 text-left font-black text-xs text-zinc-200 hover:bg-neutral-900"
                            >
                              <span className="flex items-center gap-2 uppercase tracking-wider"><Icons.User /> 用戶與偏好設定</span>
                              <Icons.ChevronDown className={`transform transition-transform ${activeSettingSection === 'general' ? 'rotate-180 text-emerald-400' : ''}`} />
                            </button>

                            {activeSettingSection === 'general' && (
                              <div className="p-4 border-t border-neutral-800 bg-[#16171b] space-y-4 animate-fadeIn text-xs">
                                <div className="space-y-1.5">
                                  <label className="text-[10px] text-zinc-500 font-black uppercase">用戶名稱</label>
                                  <input
                                    type="text"
                                    value={syncSettings.username}
                                    onChange={(e) => setSyncSettings(prev => ({ ...prev, username: e.target.value }))}
                                    className="w-full bg-neutral-950 border border-neutral-800 rounded-xl p-2.5 text-xs text-zinc-200 focus:outline-none"
                                  />
                                </div>

                                <div className="space-y-1.5">
                                  <label className="text-[10px] text-zinc-500 font-black uppercase">語系</label>
                                  <select
                                    value={syncSettings.language}
                                    onChange={(e) => {
                                      playClickSound();
                                      setSyncSettings(prev => ({ ...prev, language: e.target.value }));
                                      showToast(`🌐 語言已切換`);
                                    }}
                                    className="w-full bg-neutral-950 border border-neutral-800 rounded-xl p-2 text-xs text-zinc-200 focus:outline-none"
                                  >
                                    <option value="zh-TW">繁體中文</option>
                                    <option value="en">English</option>
                                    <option value="jp">日本語</option>
                                  </select>
                                </div>

                                <div className="pt-3 border-t border-neutral-800/60">
                                  <label className="text-[10px] text-red-500 font-black uppercase flex items-center gap-1 mb-2 animate-pulse">⚠️ 危險操作區域</label>
                                  {!isDoubleConfirmReset ? (
                                    <button
                                      type="button"
                                      onClick={() => { playClickSound(); setIsDoubleConfirmReset(true); }}
                                      className="w-full py-2 bg-red-950/20 hover:bg-red-950/40 border border-red-900/30 text-red-400 font-bold rounded-xl text-center"
                                    >
                                      重置所有 Logger 數據
                                    </button>
                                  ) : (
                                    <div className="space-y-2 p-3 bg-red-950/20 border border-red-900/40 rounded-xl animate-fadeIn">
                                      <p className="text-[10px] text-red-300 font-bold leading-relaxed">
                                        注意：此動作將清空所有本地日記、花費、以及自訂行程！
                                      </p>
                                      <div className="grid grid-cols-2 gap-2">
                                        <button onClick={handleResetData} className="py-1.5 bg-red-600 text-white font-bold rounded-lg text-center">確定清除</button>
                                        <button onClick={() => setIsDoubleConfirmReset(false)} className="py-1.5 bg-neutral-800 text-zinc-300 font-bold rounded-lg text-center">取消</button>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              </div>
                            )}
                          </div>

                          {/* 備份庫 */}
                          <div className="bg-[#1a1c20] rounded-[24px] border border-neutral-800 overflow-hidden">
                            <button
                              onClick={() => { playClickSound(); setActiveSettingSection(activeSettingSection === 'backup' ? null : 'backup'); }}
                              className="w-full flex justify-between items-center p-4 text-left font-black text-xs text-zinc-200 hover:bg-neutral-900"
                            >
                              <span className="flex items-center gap-2 uppercase tracking-wider"><Icons.Download /> 備份與還原庫</span>
                              <Icons.ChevronDown className={`transform transition-transform ${activeSettingSection === 'backup' ? 'rotate-180 text-emerald-400' : ''}`} />
                            </button>

                            {activeSettingSection === 'backup' && (
                              <div className="p-4 border-t border-neutral-800 bg-[#16171b] space-y-3 animate-fadeIn">
                                <div className="grid grid-cols-2 gap-2">
                                  <button onClick={handleExportData} className="py-2 bg-neutral-900 border border-neutral-800 text-zinc-200 text-[11px] font-black rounded-xl flex items-center justify-center gap-1.5">
                                    <Icons.Download /> 匯出備份 JSON
                                  </button>
                                  <label className="py-2 bg-neutral-900 border border-neutral-800 text-zinc-200 text-[11px] font-black rounded-xl flex items-center justify-center gap-1.5 cursor-pointer text-center">
                                    <Icons.Upload /> 匯入備份 JSON
                                    <input type="file" accept=".json" onChange={handleImportData} className="hidden" />
                                  </label>
                                </div>
                                <p className="text-[10px] text-zinc-500 leading-relaxed font-bold">
                                  💡 提示：更換手機或清除瀏覽器快取前，請在此處點擊「匯出備份」安全存檔。
                                </p>
                              </div>
                            )}
                          </div>

                        </div>
                      )}

                    </div>

                  </div>
                )}
              </div>

            </div>

          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>

</body>
</html>
