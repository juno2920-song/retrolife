  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "SF Compact Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #0d0e10;
      color: white;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      overflow-x: hidden;
    }

    /* 經典搖晃動畫 */
    @keyframes jiggle {
      0% { transform: rotate(-0.5deg) translate(-0.2px, -0.2px); }
      50% { transform: rotate(0.5deg) translate(0.2px, 0.2px); }
      100% { transform: rotate(-0.5deg) translate(-0.2px, 0.2px); }
    }
    .animate-jiggle {
      animation: jiggle 0.22s ease-in-out infinite alternate;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .animate-slideUp {
      animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .transition-ios {
      transition: all 450ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 🧱 INFOBAR 實體擬物機械鍵盤 3D 浮雕視覺樣式 */
    .tile-3d {
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 
        inset 1px 1px 0px rgba(255, 255, 255, 0.12), /* 頂部高光 */
        0px 5px 0px rgba(0, 0, 0, 0.4),              /* 3D 機械按鍵側邊 */
        0px 8px 16px rgba(0, 0, 0, 0.6);             /* 地板投影 */
      transition: transform 0.1s cubic-bezier(0.17, 0.67, 0.83, 0.67), box-shadow 0.1s ease;
    }

    /* 機械按鍵壓感反饋：向右下微移 2.5px，厚度隨之壓扁 */
    .tile-3d:active {
      transform: translate(1.5px, 4.5px);
      box-shadow: 
        inset 1px 1px 0px rgba(255, 255, 255, 0.08),
        0px 1px 0px rgba(0, 0, 0, 0.4),
        0px 2px 4px rgba(0, 0, 0, 0.8);
    }

    /* 編輯狀態下，微調壓扁效果避免與控制器衝突 */
    .tile-3d-editing {
      box-shadow: 
        inset 1px 1px 0px rgba(255, 255, 255, 0.12),
        0px 3px 0px rgba(0, 0, 0, 0.4),
        0px 4px 8px rgba(0, 0, 0, 0.5);
    }

    /* 經典米色和風瓷磚按鍵專屬側盤與按壓感 */
    .tile-3d-beige {
      box-shadow: 
        inset 1px 1px 0px rgba(255, 255, 255, 0.45),
        0px 5px 0px #c5beb1,
        0px 8px 16px rgba(0, 0, 0, 0.6);
    }
    .tile-3d-beige:active {
      transform: translate(1.5px, 4.5px);
      box-shadow: 
        inset 1px 1px 0px rgba(255, 255, 255, 0.2),
        0px 1px 0px #c5beb1,
        0px 2px 4px rgba(0, 0, 0, 0.8);
    }
  </style>

    // ==================== IndexedDB 資料儲存核心引擎 ====================
    const DB_NAME = 'iida_logger_db_v6_prod';
    const DB_VERSION = 1;
    const STORES = ['tile_layout', 'events', 'todos', 'diaries', 'expenses', 'sync_settings'];

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          STORES.forEach(store => {
            if (!db.objectStoreNames.contains(store)) {
              db.createObjectStore(store);
            }
          });
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function getDBData(storeName, key) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      } catch (err) {
        console.error('IndexedDB 讀取失敗:', err);
        return null;
      }
    }

    async function setDBData(storeName, key, val) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.put(val, key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      } catch (err) {
        console.error('IndexedDB 寫入失敗:', err);
      }
    }

    function App() {
      // 異步載入狀態

      const [isEditing, setIsEditing] = useState(false);
      const longPressTimeout = useRef(null);
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

      const showToast = (message, type = 'success') => {

      // 核心數據狀態

        language: 'zh-TW',
        soundEffects: true,
        googleClientId: '',
        googleApiKey: '',

        icloudWebcalUrl: '',
        icloudStatus: 'disconnected',
        icloudLastSync: '從未同步'
      });

      const [activeSettingSection, setActiveSettingSection] = useState(null);

      // NISHIKIGOI 經典日系和風瓷磚配色方案
      const colorPresets = {
        vermilion: { bg: 'bg-[#cf2b1f]', text: 'text-white', border: 'border-red-950/20', badge: 'bg-red-950/20 text-red-100', dot: '#cf2b1f' },
        charcoal: { bg: 'bg-[#1a1c20]', text: 'text-white', border: 'border-zinc-800/40', badge: 'bg-zinc-800 text-zinc-300', dot: '#4b5563' },
        beige: { bg: 'bg-[#f5f2eb]', text: 'text-neutral-900', border: 'border-[#e4dfd5]', badge: 'bg-neutral-900/10 text-neutral-800', dot: '#d4ceb8' },
        slate: { bg: 'bg-[#2e3a47]', text: 'text-white', border: 'border-slate-800/30', badge: 'bg-white/10 text-slate-100', dot: '#2e3a47' },
        mustard: { bg: 'bg-[#dca134]', text: 'text-neutral-950', border: 'border-amber-900/10', badge: 'bg-neutral-950/10 text-neutral-900', dot: '#dca134' },
        matcha: { bg: 'bg-[#4a5d4e]', text: 'text-white', border: 'border-emerald-950/10', badge: 'bg-emerald-950/20 text-emerald-100', dot: '#4a5d4e' },
        sky: { bg: 'bg-[#4b84a1]', text: 'text-white', border: 'border-sky-950/10', badge: 'bg-sky-950/20 text-sky-100', dot: '#4b84a1' }
      };

      // 🔴 升級模組化 W、H 數據格網
      const [tiles, setTiles] = useState([]);
      const [events, setEvents] = useState([]);
      const [todos, setTodos] = useState([]);
      const [diaries, setDiaries] = useState([]);
      const [expenses, setExpenses] = useState([]);

      // 🍏 異步從 IndexedDB 載入，並處理 LocalStorage 遷移
      useEffect(() => {
        async function loadAndMigrate() {
          const migrateOrLoad = async (storeName, lsKey, defaultValue) => {
            let val = await getDBData(storeName, 'data');
            if (val === undefined || val === null) {
              const lsVal = localStorage.getItem(lsKey);
              if (lsVal) {
                try {
                  val = JSON.parse(lsVal);
                  await setDBData(storeName, 'data', val);
                } catch (e) {
                  val = defaultValue;
                }
              } else {
                val = defaultValue;
                await setDBData(storeName, 'data', val);
              }
            }
            return val;
          };

          // 🔴 預設自由配置寬 W(1~3), 高 H(1~3)
          const loadedTiles = await migrateOrLoad('tile_layout', 'infobar_tile_layout_v6_prod', [
            { id: 'clock', type: 'clock', w: 2, h: 1, color: 'charcoal' },
            { id: 'weather', type: 'weather', w: 1, h: 1, color: 'beige' },
            { id: 'calendar', type: 'calendar', w: 3, h: 2, color: 'charcoal' },
            { id: 'diary', type: 'diary', w: 1, h: 1, color: 'vermilion' },
            { id: 'expense', type: 'expense', w: 1, h: 1, color: 'slate' },
            { id: 'todo', type: 'todo', w: 1, h: 1, color: 'beige' },
            { id: 'settings', type: 'settings', w: 1, h: 1, color: 'slate' }
          ]);
          
          const upgradedTiles = loadedTiles.map(t => {
            if (t.w === undefined) {
              t.w = t.size === 3 ? 3 : t.size === 2 ? 2 : 1;
              t.h = t.size === 3 ? 2 : 1;
            }
            return t;
          });
          setTiles(upgradedTiles);

          const loadedEvents = await migrateOrLoad('events', 'infobar_events_v6_prod', [
            { id: 'ev1', date: getFormattedDateStr(new Date()), title: '深澤直人設計講座 🎨', time: '14:00', color: 'bg-red-500', desc: '線上研討會 / NISHIKIGOI 美學探討' },

          ]);
          setEvents(loadedEvents);

          const loadedTodos = await migrateOrLoad('todos', 'infobar_todos_v6_prod', [

            { id: 't2', date: getFormattedDateStr(new Date()), text: '晚間 3 公里極簡慢跑 🏃', completed: true }
          ]);
          setTodos(loadedTodos);

          const loadedDiaries = await migrateOrLoad('diaries', 'infobar_diaries_v6_prod', [
            { id: 'd1', date: getFormattedDateStr(new Date()), text: '今天我將版面優化為真正 100% 滿版適配 iPhone 屏幕，沉浸感十足，完全無邊框！而且終於實裝了真正的雲端同步機制！', category: 'diary', mood: '😊', weather: '☀️' }
          ]);
          setDiaries(loadedDiaries);

          const loadedExpenses = await migrateOrLoad('expenses', 'infobar_expenses_v6_prod', [
            { id: 'e1', date: getFormattedDateStr(new Date()), amount: 150, category: '餐飲', description: '午餐外帶極簡日式弁當' },
            { id: 'e2', date: getFormattedDateStr(new Date()), amount: 65, category: '交通', description: '乘地鐵通勤' }
          ]);
          setExpenses(loadedExpenses);

          const loadedSyncSettings = await migrateOrLoad('sync_settings', 'iida_sync_settings_v6_prod', {
            username: '深澤直人',
            language: 'zh-TW',
            soundEffects: true,
            googleClientId: '',
            googleApiKey: '',
            googleStatus: 'disconnected',
            googleLastSync: '從未同步',
            icloudWebcalUrl: '',
            icloudStatus: 'disconnected',
            icloudLastSync: '從未同步'
          });
          setSyncSettings(loadedSyncSettings);

          setIsLoaded(true);
        }
        loadAndMigrate();
      }, []);

          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(1200, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.03);
          gain.gain.setValueAtTime(0.02, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
          osc.start();
          osc.stop(ctx.currentTime + 0.04);
        } catch (e) {
          console.log("音效受限播放。");

        const days = [];
        for (let i = 0; i < 14; i++) {
          const nextDay = new Date(sunday);
          nextDay.setDate(sunday.getDate() + i);
          days.push({
            date: nextDay,
            isCurrentMonth: nextDay.getMonth() === today.getMonth()
          });
        }

          const lines = icsText.split(/\r?\n/);

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.startsWith('BEGIN:VEVENT')) {
              currentEv = {};

              if (currentEv && currentEv.dtstart && currentEv.summary) {
                const dt = currentEv.dtstart;
                const year = dt.slice(0, 4);
                const month = dt.slice(4, 6);
                const day = dt.slice(6, 8);

                  title: `🍏 ${currentEv.summary}`,
                  time: timeStr,
                  color: 'bg-sky-500',
                  desc: currentEv.description || '來自 iCloud 行事曆同步'
                });
              }
              currentEv = null;
            } else if (currentEv) {
              const colonIndex = line.indexOf(':');
              if (colonIndex !== -1) {
                const key = line.slice(0, colonIndex);
                const val = line.slice(colonIndex + 1);
                if (key.startsWith('SUMMARY')) currentEv.summary = val;
                if (key.startsWith('DTSTART')) currentEv.dtstart = val;
                if (key.startsWith('DESCRIPTION')) currentEv.description = val;

          <div 
            onClick={(e) => e.stopPropagation()} // 阻斷 click 防止跳轉子頁
            className="absolute inset-0 bg-black/85 backdrop-blur-xs flex flex-col items-center justify-center p-1.5 z-30 rounded-[8px] animate-fadeIn text-white gap-1.5"
          >
            <span className="text-[10px] font-black uppercase tracking-widest text-[#cf2b1f] text-center leading-none">調整方格尺寸</span>
            
            <div className="flex flex-col gap-1 w-full max-w-[100px]">
              {/* 寬度控制 */}
              <div className="flex items-center justify-between text-[9px] gap-1">
                <span className="font-bold opacity-75">寬(W):</span>
                <div className="flex gap-0.5">
                  {[1, 2, 3].map(wVal => (
                    <button
                      key={wVal}
                      type="button"
                      onClick={() => resizeTile(tile.id, 'w', wVal)}
                      className={`w-5 h-4.5 text-[10px] rounded font-mono font-black transition-all flex items-center justify-center ${
                        tile.w === wVal ? 'bg-[#cf2b1f] text-white shadow-md' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'
                      }`}
                    >
                      {wVal}
                    </button>
                  ))}
                </div>
              </div>

              {/* 高度控制 */}
              <div className="flex items-center justify-between text-[9px] gap-1">
                <span className="font-bold opacity-75">高(H):</span>
                <div className="flex gap-0.5">
                  {[1, 2, 3].map(hVal => (
                    <button
                      key={hVal}
                      type="button"
                      onClick={() => resizeTile(tile.id, 'h', hVal)}
                      className={`w-5 h-4.5 text-[10px] rounded font-mono font-black transition-all flex items-center justify-center ${
                        tile.h === hVal ? 'bg-[#cf2b1f] text-white shadow-md' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'
                      }`}
                    >
                      {hVal}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>

</body>
</html>
